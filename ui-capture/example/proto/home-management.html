<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thynco | Home Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="./common.css">
    <link rel="stylesheet" href="./user.css">
    <link rel="stylesheet" href="./devices.css">
</head>

<body>
    <div id="canvas-viewport">
        <div class="mesh-bg"></div>
        <div id="app-content">
            <section id="home-management" class="stage active profile-modern-stage">
                <header class="header">
                    <div class="header-left row">
                        <button type="button" class="modern-back-btn" onclick="location.href='settings.html'">
                            <span class="material-icons">arrow_back_ios</span>
                        </button>
                        <h1 class="header-title">Home Management</h1>
                    </div>
                </header>

                <nav class="modern-settings-container">
                    <div class="settings-group-modern">
                        <h3 class="group-label-modern">Your Homes</h3>
                        <ul class="modern-card-list google-card" data-home-list>
                            <!-- Dynamically populated -->
                        </ul>
                    </div>

                    <button type="button" class="modern-logout-btn" style="color: var(--primary); border-color: var(--primary-container); background: var(--primary-container);" onclick="location.href='add-home.html'">
                        <span class="material-icons">add_home</span>
                        Create New Home
                    </button>
                </nav>
            </section>
        </div>

        <!-- Edit Home Modal -->
        <div class="modal-overlay" data-edit-modal aria-hidden="true">
            <div class="modal-sheet">
                <div class="modal-head">
                    <button type="button" class="circle-btn" data-modal-close style="background: rgba(0,0,0,0.04); box-shadow: none; width: 40px; height: 40px;">
                        <span class="material-icons" style="font-size: 20px;">close</span>
                    </button>
                    <h2 class="modal-title">Home Settings</h2>
                    <button type="button" class="modal-btn modal-btn--primary" data-save-home style="flex: 0 0 auto; padding: 8px 16px; border-radius: 12px; font-size: 14px; height: 40px; box-shadow: none;">Save</button>
                </div>
                <div class="modal-body">
                    <!-- Home Identity -->
                    <div class="modal-group">
                        <div class="modal-group-title">General</div>
                        <div class="modal-input-group">
                            <label>Home Name</label>
                            <input type="text" class="modal-input" data-edit-name placeholder="Home Name">
                        </div>
                        <div class="modal-input-group">
                            <label>Acting As (Preview)</label>
                            <select class="modal-select" data-actor-member></select>
                            <div class="modal-list-sub" style="margin-top: 4px; padding-left: 4px;" data-actor-hint></div>
                        </div>
                    </div>

                    <!-- Location with Map Picker -->
                    <div class="modal-group">
                        <div class="modal-group-title">Location</div>
                        <div class="map-picker-container" data-map-picker>
                            <div class="map-picker-bg" data-map-bg></div>
                            <div class="map-picker-grid"></div>
                            <div class="map-pin">
                                <span class="material-icons" style="font-size: 32px;">location_on</span>
                            </div>
                        </div>
                        <div class="modal-row">
                            <div style="flex: 1;">
                                <label style="font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">Latitude</label>
                                <input type="number" class="modal-input" data-edit-lat placeholder="0.000" step="any" inputmode="decimal" style="padding: 10px 12px; font-size: 13px;" />
                            </div>
                            <div style="flex: 1;">
                                <label style="font-size: 11px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase;">Longitude</label>
                                <input type="number" class="modal-input" data-edit-lng placeholder="0.000" step="any" inputmode="decimal" style="padding: 10px 12px; font-size: 13px;" />
                            </div>
                        </div>
                        <div class="modal-list-sub" style="padding-left: 4px;">Tap the map to set location</div>
                    </div>

                    <!-- Rooms Management -->
                    <div class="modal-group">
                        <div class="modal-group-title">Rooms</div>
                        <ul class="modal-list" data-room-list></ul>
                        <div class="modal-row" style="margin-top: 4px;">
                            <input type="text" class="modal-input" data-new-room placeholder="New room name" style="flex: 1;">
                            <button type="button" class="circle-btn" style="background: var(--primary); color: white; width: 48px; height: 48px;" data-add-room>
                                <span class="material-icons">add</span>
                            </button>
                        </div>
                    </div>

                    <!-- Members & Permissions -->
                    <div class="modal-group">
                        <div class="modal-group-title">Family Members</div>
                        <ul class="modal-list" data-member-list></ul>
                        
                        <div class="modal-input-group" style="margin-top: 8px;">
                            <label>Invite New Member</label>
                            <div class="modal-row">
                                <input type="text" class="modal-input" data-new-member-name placeholder="Name" style="flex: 1;">
                                <select class="modal-select" data-new-member-role style="width: 110px;">
                                    <option value="guest">Guest</option>
                                    <option value="member">Member</option>
                                    <option value="admin">Admin</option>
                                </select>
                                <button type="button" class="circle-btn" style="background: var(--primary); color: white; width: 48px; height: 48px;" data-add-member>
                                    <span class="material-icons">person_add</span>
                                </button>
                            </div>
                        </div>

                        <div class="modal-input-group" data-transfer-row style="border-top: 1px solid rgba(0,0,0,0.05); pt: 16px; margin-top: 8px;">
                            <label>Transfer Ownership</label>
                            <div class="modal-row">
                                <select class="modal-select" data-transfer-target style="flex: 1;"></select>
                                <button type="button" class="modal-btn modal-btn--outline" data-transfer-owner style="flex: 0 0 auto; padding: 12px 20px; font-size: 14px;">Transfer</button>
                            </div>
                        </div>
                        
                        <button type="button" class="modal-btn modal-btn--danger" style="margin-top: 8px; background: rgba(239, 68, 68, 0.05);" data-leave-home>
                            <span class="material-icons" style="font-size: 20px;">logout</span>
                            Leave Home
                        </button>
                    </div>
                    
                    <!-- Destructive Actions -->
                    <div style="margin-top: 20px; padding: 0 4px;">
                        <button type="button" class="modal-btn modal-btn--danger" style="background: rgba(239, 68, 68, 0.03); color: #EF4444; border: 1px dashed rgba(239, 68, 68, 0.2);" data-delete-home>
                            <span class="material-icons" style="font-size: 20px;">delete_outline</span>
                            Delete Home
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.querySelector('[data-home-list]');
            const modal = document.querySelector('[data-edit-modal]');

            const editNameInput = document.querySelector('[data-edit-name]');
            const editLatInput = document.querySelector('[data-edit-lat]');
            const editLngInput = document.querySelector('[data-edit-lng]');
            const actorSelect = document.querySelector('[data-actor-member]');
            const actorHint = document.querySelector('[data-actor-hint]');
            const roomList = document.querySelector('[data-room-list]');
            const newRoomInput = document.querySelector('[data-new-room]');
            const addRoomBtn = document.querySelector('[data-add-room]');
            const newMemberNameInput = document.querySelector('[data-new-member-name]');
            const newMemberRoleSelect = document.querySelector('[data-new-member-role]');
            const addMemberBtn = document.querySelector('[data-add-member]');
            const transferRow = document.querySelector('[data-transfer-row]');
            const transferTarget = document.querySelector('[data-transfer-target]');
            const transferBtn = document.querySelector('[data-transfer-owner]');
            const leaveBtn = document.querySelector('[data-leave-home]');
            const saveBtn = document.querySelector('[data-save-home]');
            const deleteBtn = document.querySelector('[data-delete-home]');
            
            const mapPicker = document.querySelector('[data-map-picker]');
            const mapBg = document.querySelector('[data-map-bg]');

                if (!mapBg) return;
                const zoom = 12;
                // Using a slightly more realistic mock URL that doesn't actually need a real key for a prototype UI
                mapBg.style.backgroundImage = `url('https://api.mapbox.com/styles/v1/mapbox/light-v10/static/${lng},${lat},${zoom}/400x200?access_token=pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ==')`;
            };

            mapPicker?.addEventListener('click', (e) => {
                const rect = mapPicker.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                
                // Map coordinates from click (very rough mock)
                const baseLat = Number(editLatInput.value) || 37.789;
                const baseLng = Number(editLngInput.value) || -122.401;
                
                const newLat = (baseLat + (0.5 - y) * 0.1).toFixed(4);
                const newLng = (baseLng + (x - 0.5) * 0.1).toFixed(4);
                
                editLatInput.value = newLat;
                editLngInput.value = newLng;
                updateMapUI(newLat, newLng);
            });

                const homes = window.HomeManager.getHomes();
                list.innerHTML = homes.map(h => `
                    <li>
                        <div class="modern-list-item">
                            <span class="item-icon-modern icon-purple">
                                <span class="material-icons">home</span>
                            </span>
                            <span class="item-content-modern">
                                <h4>${h.name}</h4>
                                <p>${h.rooms?.length || 0} Rooms âą ${h.members?.length || 0} Members</p>
                            </span>
                            <button type="button" class="circle-btn" style="background: rgba(0,0,0,0.05); color: #666;" onclick="openEditModal('${h.id}')">
                                <span class="material-icons" style="font-size: 18px;">edit</span>
                            </button>
                        </div>
                    </li>
                `).join('');
            };

            const getHome = () => editingHomeId ? window.HomeManager.getHome(editingHomeId) : null;
            const can = (action) => {
                const home = getHome();
                if (!home) return false;
                return window.HomeManager.can(home.id, action);
            };

            const syncPermissionUI = (home) => {
                const canEditHome = window.HomeManager.can(home.id, 'home:edit');
                const canDeleteHome = window.HomeManager.can(home.id, 'home:delete');
                const canManageRooms = window.HomeManager.can(home.id, 'room:manage');
                const canInvite = window.HomeManager.can(home.id, 'member:invite');
                const canTransfer = window.HomeManager.can(home.id, 'member:transfer');

                if (editNameInput) editNameInput.disabled = !canEditHome;
                if (editLatInput) editLatInput.disabled = !canEditHome;
                if (editLngInput) editLngInput.disabled = !canEditHome;
                if (saveBtn) saveBtn.disabled = !canEditHome;

                if (newRoomInput) newRoomInput.disabled = !canManageRooms;
                if (addRoomBtn) addRoomBtn.disabled = !canManageRooms;

                if (newMemberNameInput) newMemberNameInput.disabled = !canInvite;
                if (newMemberRoleSelect) newMemberRoleSelect.disabled = !canInvite;
                if (addMemberBtn) addMemberBtn.disabled = !canInvite;

                if (deleteBtn) deleteBtn.disabled = !canDeleteHome;
                if (transferRow) transferRow.style.display = canTransfer && (home.members || []).length > 1 ? 'flex' : 'none';

                if (leaveBtn) {
                    const actor = window.HomeManager.getActorMember(home.id);
                    leaveBtn.disabled = (actor?.role || '').toString().toLowerCase() === 'owner';
                }
            };

                if (!actorSelect) return;

                    const label = `${m.name} (${(m.role || '').toString()})`;
                    const selected = m.id === actorId ? 'selected' : '';
                    return `<option value="${m.id}" ${selected}>${label}</option>`;
                }).join('');
